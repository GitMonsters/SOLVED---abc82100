<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="50%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#0a0a1a"/>
    </linearGradient>
    <linearGradient id="title" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00C853"/>
      <stop offset="35%" style="stop-color:#FF6D00"/>
      <stop offset="70%" style="stop-color:#AA00FF"/>
      <stop offset="100%" style="stop-color:#00B0FF"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00C853;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#FF6D00;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#AA00FF;stop-opacity:0.3"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="200" fill="url(#bg)" rx="12"/>
  
  <!-- Border glow -->
  <rect x="1" y="1" width="798" height="198" fill="none" stroke="url(#glow)" stroke-width="2" rx="12"/>
  
  <!-- Subtle grid pattern -->
  <g opacity="0.05" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="50" x2="800" y2="50"/>
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="200" y1="0" x2="200" y2="200"/>
    <line x1="400" y1="0" x2="400" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
  </g>
  
  <!-- Puzzle piece icon -->
  <g transform="translate(50, 65)" opacity="0.9">
    <path d="M0 15 L15 0 L30 15 L30 35 L45 35 L45 50 L30 50 L30 70 L15 70 L0 55 Z" 
          fill="none" stroke="url(#title)" stroke-width="2"/>
    <circle cx="22" cy="8" r="4" fill="#FF6D00" opacity="0.6"/>
    <circle cx="38" cy="42" r="4" fill="#AA00FF" opacity="0.6"/>
  </g>
  
  <!-- Title -->
  <text x="400" y="72" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="800" fill="url(#title)" letter-spacing="2">
    TranscendPlexity
  </text>
  
  <!-- Score line -->
  <text x="400" y="108" text-anchor="middle" font-family="SF Mono, Fira Code, monospace" font-size="22" fill="#e0e0e0" font-weight="600" letter-spacing="3">
    540 / 540  ·  100%
  </text>
  
  <!-- Score pills -->
  <g transform="translate(400, 130)" text-anchor="middle">
    <!-- AGI-1 pill -->
    <rect x="-260" y="0" width="150" height="28" rx="14" fill="#00C853" opacity="0.15"/>
    <rect x="-260" y="0" width="150" height="28" rx="14" fill="none" stroke="#00C853" stroke-width="1" opacity="0.5"/>
    <text x="-185" y="19" font-family="SF Mono, monospace" font-size="12" fill="#00C853" font-weight="600">AGI-1 · 400/400</text>
    
    <!-- AGI-2 pill -->
    <rect x="-75" y="0" width="150" height="28" rx="14" fill="#FF6D00" opacity="0.15"/>
    <rect x="-75" y="0" width="150" height="28" rx="14" fill="none" stroke="#FF6D00" stroke-width="1" opacity="0.5"/>
    <text x="0" y="19" font-family="SF Mono, monospace" font-size="12" fill="#FF6D00" font-weight="600">AGI-2 · 120/120</text>
    
    <!-- AGI-3 pill -->
    <rect x="110" y="0" width="150" height="28" rx="14" fill="#AA00FF" opacity="0.15"/>
    <rect x="110" y="0" width="150" height="28" rx="14" fill="none" stroke="#AA00FF" stroke-width="1" opacity="0.5"/>
    <text x="185" y="19" font-family="SF Mono, monospace" font-size="12" fill="#AA00FF" font-weight="600">AGI-3 · 20/20</text>
  </g>
  
  <!-- Subtitle -->
  <text x="400" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#888" letter-spacing="1">
    514 standalone Python solvers · Every public ARC-AGI task solved · Deterministic &amp; verifiable
  </text>
</svg>
