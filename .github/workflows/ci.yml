name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          /opt/homebrew/bin/python3.12 -m pip install pytest --break-system-packages -q

      - name: Run tests
        run: |
          /opt/homebrew/bin/python3.12 -m pytest -q
